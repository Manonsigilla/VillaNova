<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenue - VillaNova</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body class="theme-light">
    <header class="landing-header">
        <div class="logo">VillaNova</div>
        <button id="theme-toggle" aria-label="Basculer le thème clair/sombre">
            Mode Sombre
        </button>
    </header>

    <main class="auth-container">
        <!-- Section de choix -->
        <div id="auth-choices" class="auth-panel">
            <h1>Bienvenue sur VillaNova</h1>
            <p>Veuillez vous identifier pour accéder aux événements.</p>
            <div class="auth-buttons">
                <button id="btn-show-login" class="btn-primary">Se connecter</button>
                <button id="btn-show-register" class="btn-secondary">S'inscrire</button>
            </div>
        </div>

        <!-- Formulaire de connexion (masqué par défaut) -->
        <div id="login-panel" class="auth-panel hidden">
            <h2>Connexion</h2>
            <form id="login-form" novalidate>
                <div class="form-group">
                    <label for="login-email">Adresse e-mail</label>
                    <input type="email" id="login-email" required>
                </div>
                <div class="form-group">
                    <label for="login-password">Mot de passe</label>
                    <input type="password" id="login-password" required>
                </div>
                <button type="submit" class="btn-primary">Valider</button>
                <button type="button" class="btn-link btn-back">Retour</button>
            </form>
        </div>

        <!-- Formulaire d'inscription (masqué par défaut) -->
        <div id="register-panel" class="auth-panel hidden">
            <h2>Inscription</h2>
            <form id="register-form" novalidate>
                <div class="form-group">
                    <label for="reg-email">Adresse e-mail</label>
                    <input type="email" id="reg-email" required>
                </div>
                <div class="form-group">
                    <label for="reg-password">Mot de passe</label>
                    <input type="password" id="reg-password" required aria-describedby="reg-password-error">
                    <span id="reg-password-error" class="error-message" aria-live="polite"></span>
                </div>
                <button type="submit" class="btn-primary">Créer mon compte</button>
                <button type="button" class="btn-link btn-back">Retour</button>
            </form>
        </div>
    </main>

    <footer class="landing-footer">
        <nav>
            <ul>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="politique.html">Politique & Confidentialité</a></li>
            </ul>
        </nav>
    </footer>

    <script src="js/auth.js"></script>
</body>
</html>
