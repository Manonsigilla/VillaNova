<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - VillaNova</title>
    <!-- Lien vers votre CSS compilé -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html">Retour à l'accueil</a>
        </nav>
    </header>
    <main>
        <section class="auth-section">
            <h1>Connexion</h1>
            <form id="login-form" novalidate>
                <div class="form-group">
                    <label for="email">Adresse e-mail</label>
                    <input type="email" id="email" name="email" required aria-describedby="email-error">
                    <span id="email-error" class="error-message" aria-live="polite"></span>
                </div>
                
                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <input type="password" id="password" name="password" required aria-describedby="password-error">
                    <span id="password-error" class="error-message" aria-live="polite"></span>
                </div>
                
                <button type="submit">Se connecter</button>
            </form>
        </section>
    </main>
    <script src="js/connexion.js"></script>
</body>
</html>
