<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - VillaNova</title>
    <link rel="stylesheet" href="../css/main.css">
</head>
<body class="theme-light">
    <!-- Le script de thème (auth.js ou un script global) devrait être chargé pour appliquer le thème stocké -->
    <header class="header">
        <div class="header__container header__top">
            <h1 class="header__title">
                <a href="index.html" class="header__logo">VillaNova</a>
            </h1>
            
            <!-- Structure conforme à votre _theme-toggle.scss -->
            <button class="header__theme-toggle" id="theme-toggle" aria-pressed="false" aria-label="Basculer le thème clair/sombre">
                <!-- Icônes SVG simulées ou réelles -->
                <span class="theme-toggle__icon icon-sun">☀️</span>
                <span class="theme-toggle__icon icon-moon">🌙</span>
                <span class="theme-toggle__thumb"></span>
            </button>
        </div>
    </header>

    <main class="static-content">
        <h1>Nous contacter</h1>
        <p>Pour toute question concernant l'application VillaNova ou les événements, veuillez remplir le formulaire ci-dessous.</p>
        
        <form id="contact-form">
            <div class="form-group">
                <label for="contact-name">Nom complet</label>
                <input type="text" id="contact-name" required>
            </div>
            <div class="form-group">
                <label for="contact-email">Adresse e-mail</label>
                <input type="email" id="contact-email" required>
            </div>
            <div class="form-group">
                <label for="contact-message">Message</label>
                <textarea id="contact-message" rows="5" required></textarea>
            </div>
            <button type="submit" class="btn-primary">Envoyer</button>
        </form>
    </main>

    <footer class="footer">
        <div class="footer__container">
            <div class="footer__content">
                <p class="footer__text">© 2026 VillaNova. Tous droits réservés.</p>
                <ul class="footer__links">
                    <li><a href="contact.html" class="footer__link">Contact</a></li>
                    <li><a href="politique.html" class="footer__link">Politique & Confidentialité</a></li>
                </ul>
            </div>
        </div>
    </footer>
</body>
</html>
