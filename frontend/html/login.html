<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenue - VillaNova</title>
    <link rel="stylesheet" href="../css/main.css">
</head>
<body class="theme-light">
    <header class="header">
        <div class="header__container header__top">
            <h1 class="header__title">
                <a href="index.html" class="header__logo">VillaNova</a>
            </h1>
            
            <!-- Structure conforme à votre _theme-toggle.scss -->
            <button class="header__theme-toggle" id="theme-toggle" aria-pressed="false" aria-label="Basculer le thème clair/sombre">
                <!-- Icônes SVG simulées ou réelles -->
                <span class="theme-toggle__icon icon-sun">☀️</span>
                <span class="theme-toggle__icon icon-moon">🌙</span>
                <span class="theme-toggle__thumb"></span>
            </button>
        </div>
    </header>

    <main class="auth-container">
        <!-- Section de choix -->
        <div id="auth-choices" class="auth-panel">
            <h1>Bienvenue sur VillaNova</h1>
            <p>Veuillez vous identifier pour accéder aux événements.</p>
            <div class="auth-buttons">
                <button id="btn-show-login" class="btn-primary">Se connecter</button>
                <button id="btn-show-register" class="btn-secondary">S'inscrire</button>
            </div>
        </div>

        <!-- Formulaire de connexion (masqué par défaut) -->
        <div id="login-panel" class="auth-panel hidden">
            <h2>Connexion</h2>
            <form id="login-form" novalidate>
                <div class="form-group">
                    <label for="login-email">Adresse e-mail</label>
                    <input type="email" id="login-email" required>
                </div>
                <div class="form-group">
                    <label for="login-password">Mot de passe</label>
                    <input type="password" id="login-password" required>
                </div>
                <button type="submit" class="btn-primary">Valider</button>
                <button type="button" class="btn-link btn-back">Retour</button>
            </form>
        </div>

        <!-- Formulaire d'inscription (masqué par défaut) -->
        <div id="register-panel" class="auth-panel hidden">
            <h2>Inscription</h2>
            <form id="register-form" novalidate>
                <div class="form-group">
                    <label for="reg-email">Adresse e-mail</label>
                    <input type="email" id="reg-email" required>
                </div>
                <div class="form-group">
                    <label for="reg-password">Mot de passe</label>
                    <input type="password" id="reg-password" required aria-describedby="reg-password-error">
                    <span id="reg-password-error" class="error-message" aria-live="polite"></span>
                </div>
                <button type="submit" class="btn-primary">Créer mon compte</button>
                <button type="button" class="btn-link btn-back">Retour</button>
            </form>
        </div>
    </main>

    <footer class="footer">
        <div class="footer__container">
            <div class="footer__content">
                <p class="footer__text">© 2026 VillaNova. Tous droits réservés.</p>
                <ul class="footer__links">
                    <li><a href="contact.html" class="footer__link">Contact</a></li>
                    <li><a href="politique.html" class="footer__link">Politique & Confidentialité</a></li>
                </ul>
            </div>
        </div>
    </footer>

    <script src="../js/auth.js"></script>
</body>
</html>
