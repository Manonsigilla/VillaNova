<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenue - VillaNova</title>
    <link rel="stylesheet" href="../css/main.css">
</head>
<body class="theme-light">
    <header class="header">
        <div class="header__container header__top">
            <h1 class="header__title">
                <a href="index.html" class="header__logo">VillaNova</a>
            </h1>
            
            <!-- Structure conforme à votre _theme-toggle.scss -->
            <button class="header__theme-toggle" id="theme-toggle" aria-pressed="false" aria-label="Basculer le thème clair/sombre">
                <span class="theme-toggle__thumb"></span>
            </button>
        </div>
    </header>

    <main class="auth-container">
        <div class="auth-card">
            <!-- Toggle Tabs -->
            <div class="auth-tabs" role="tablist">
                <button id="tab-login" class="auth-tab active" role="tab" aria-selected="true" aria-controls="login-form-container">Se connecter</button>
                <button id="tab-register" class="auth-tab" role="tab" aria-selected="false" aria-controls="register-form-container">S'inscrire</button>
                <div class="auth-tab-indicator"></div>
            </div>

            <!-- Formulaire de connexion -->
            <div id="login-form-container" class="auth-form-container active" role="tabpanel" aria-labelledby="tab-login">
                <h2>Content de vous revoir</h2>
                <p class="auth-subtitle">Accédez à votre compte pour découvrir nos événements.</p>
                <form id="login-form" novalidate>
                    <div class="form-group">
                        <label for="login-email">Adresse e-mail</label>
                        <input type="email" id="login-email" placeholder="votre@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="login-password">Mot de passe</label>
                        <input type="password" id="login-password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn-primary">Se connecter</button>
                </form>
            </div>

            <!-- Formulaire d'inscription -->
            <div id="register-form-container" class="auth-form-container hidden" role="tabpanel" aria-labelledby="tab-register">
                <h2>Créer un compte</h2>
                <p class="auth-subtitle">Rejoignez VillaNova pour participer à la vie locale.</p>
                <form id="register-form" novalidate>
                    <div class="form-group">
                        <label for="reg-email">Adresse e-mail</label>
                        <input type="email" id="reg-email" placeholder="votre@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="reg-password">Mot de passe</label>
                        <input type="password" id="reg-password" placeholder="8+ caractères, 1 chiffre, 1 majuscule" required aria-describedby="reg-password-error">
                        <span id="reg-password-error" class="error-message" aria-live="polite"></span>
                    </div>
                    <button type="submit" class="btn-primary">S'inscrire</button>
                </form>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer__container">
            <div class="footer__content">
                <p class="footer__text">© 2026 VillaNova. Tous droits réservés.</p>
                <ul class="footer__links">
                    <li><a href="contact.html" class="footer__link">Contact</a></li>
                    <li><a href="politique.html" class="footer__link">Politique & Confidentialité</a></li>
                </ul>
            </div>
        </div>
    </footer>

    <script src="../js/auth.js"></script>
</body>
</html>
